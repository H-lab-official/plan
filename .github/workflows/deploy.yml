name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-plan4eve
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build frontend + server
        run: npm run build

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.2
        env:
          REPO_URL: https://github.com/H-lab-official/plan.git
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 10m
          envs: REPO_URL
          script: |
            set -e
            APP_DIR="/var/www/plan4eve"

            if [ ! -d "$APP_DIR/.git" ]; then
              echo "==> First deploy: clone public repo..."
              sudo mkdir -p /var/www
              sudo chown "$USER:$USER" /var/www
              git clone "$REPO_URL" "$APP_DIR"
            fi

            cd "$APP_DIR"
            bash scripts/deploy.sh
